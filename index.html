<style>
  /* ── Apple HIG × Barossa — semantic tokens, light mode defaults ─────────── */
  :root {
    /* Barossa surface tokens */
    --zb-bg:            #f9f5ee;   /* body / primary background (cream) */
    --zb-bg-2:          #fdfaf3;   /* card / modal surface */
    --zb-bg-grouped:    #f4ede1;   /* grouped list container */
    --zb-separator:     #e8ddc8;
    --zb-hairline:      rgba(90, 64, 48, 0.08);
    --zb-shadow:        0 1px 2px rgba(60, 40, 20, 0.04), 0 3px 10px rgba(60, 40, 20, 0.06);
    --zb-shadow-raised: 0 1px 2px rgba(60, 40, 20, 0.06), 0 8px 24px rgba(60, 40, 20, 0.10);
    /* HIG semantic labels */
    --zb-label:         #2d1f0f;
    --zb-label-2:       #6a5040;
    --zb-label-3:       #9a8070;
    --zb-label-4:       #b9a794;
    /* Accent — Barossa warm */
    --zb-earth:         #9c7a54;
    --zb-earth-light:   #f0e8dc;
    --zb-earth-mid:     #d4b896;
    --zb-sage:          #8aab7a;
    --zb-sage-light:    #eaf3e4;
    --zb-sage-mid:      #c5dbb8;
    --zb-blue:          #7a9bb5;
    --zb-blue-light:    #deeaf4;
    --zb-blue-mid:      #b5cfe0;
    --zb-pink:          #c4889a;
    --zb-pink-light:    #f5e0e6;
    --zb-pink-mid:      #e8bbc8;
    --zb-gold:          #c4a842;
    --zb-cream:         #f9f5ee;  /* explicit alias for legacy uses */
    --zb-white:         #ffffff;
    --zb-border:        #e0d4c8;
    /* Status */
    --zb-success:       #2e7d5b;
    --zb-warn:          #b8892d;
    --zb-danger:        #b03a48;
    /* Type — system & serif (Apple HIG stacks) */
    --zb-font-sans:     -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", system-ui, "Helvetica Neue", Helvetica, Arial, sans-serif;
    --zb-font-serif:    "New York", "Palatino Linotype", Palatino, "Book Antiqua", Georgia, serif;
    /* Radii — HIG-tuned */
    --zb-radius-sm:     8px;
    --zb-radius:        12px;
    --zb-radius-lg:     18px;
    --zb-radius-xl:     26px;
    /* Motion */
    --zb-ease:          cubic-bezier(0.22, 1, 0.36, 1);
    --zb-ease-snap:     cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* ── Dark mode (auto, follows OS setting) — HIG expectation ──────────────── */
  @media (prefers-color-scheme: dark) {
    :root {
      --zb-bg:            #1a1613;
      --zb-bg-2:          #221d17;
      --zb-bg-grouped:    #2b2419;
      --zb-separator:     #3a3128;
      --zb-hairline:      rgba(244, 237, 225, 0.08);

  /* ── HIG button interactions ─ subtle press, standard timing ────────────── */
  button {
    font-family: inherit;
    transition: transform 160ms var(--zb-ease-snap), opacity 160ms var(--zb-ease-snap), background-color 160ms var(--zb-ease), box-shadow 200ms var(--zb-ease);
  }
  button:active:not(:disabled) {
    transform: scale(0.97);
    opacity: 0.86;
  }

  /* Range sliders retain Barossa thumb */
  input[type=range] {
    -webkit-appearance: none; appearance: none;
    width: 100%; height: 4px; border-radius: 2px;
    background: var(--zb-border); outline: none; cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--zb-earth); border: 2px solid var(--zb-white);
    box-shadow: 0 1px 4px rgba(0,0,0,0.25); cursor: pointer;

  input, textarea, select { font-family: inherit; outline: none; color: var(--zb-label); background-color: transparent; }
  input[type=number]:focus, input[type=text]:focus, textarea:focus, select:focus {

  button, input, select, textarea { touch-action: manipulation; font-family: inherit; }

  /* ── Safe-area insets for fixed chrome (notch / home indicator) ─────────── */
  @supports (padding-top: env(safe-area-inset-top)) {
    .zb-header { padding-top: calc(12px + env(safe-area-inset-top)); }
    .zb-bottom { padding-bottom: calc(4px + env(safe-area-inset-bottom)); }
  }

  .zb-serif { font-family: var(--zb-font-serif); letter-spacing: 0.1px; }

  button:focus-visible, a:focus-visible {

    outline-offset: 2px;

// ─── WINE GLASS FILTER ICON — fills with red wine as fillPct 0-100 ───────────
const WineGlassFilter = ({ size = 28, fillPct = 0, active = false }) => {
  // fillPct: 0 = empty, 100 = full. Wine fills from bottom of the bowl upward.
  // Bowl interior roughly y: 8 (top) to y: 17 (base of bowl)
  const bowlTop = 8, bowlBottom = 16;
  const wineY = bowlBottom - ((bowlBottom - bowlTop) * (fillPct / 100));
  const circleBg = active ? "#f4e3d5" : "#fdf8f0";
  const circleStroke = active ? "#9c7a54" : "#d8c8b5";
  return (
    <svg width={size} height={size} viewBox="0 0 28 28" xmlns="http://www.w3.org/2000/svg">
      {/* Circle background */}
      <circle cx="14" cy="14" r="13" fill={circleBg} stroke={circleStroke} strokeWidth="1"/>
      <defs>
        {/* Clip the wine to inside the glass bowl */}
        <clipPath id="wineClip">
          <path d="M 9,5 Q 8.3,10.5 9,13.5 Q 9.8,16.3 14,16.5 Q 18.2,16.3 19,13.5 Q 19.7,10.5 19,5 Z"/>
        </clipPath>
        {/* Subtle wine gradient */}
        <linearGradient id="wineGrad" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0%" stopColor="#a01f2f" stopOpacity="0.95"/>
          <stop offset="100%" stopColor="#6b0f1f" stopOpacity="0.95"/>
        </linearGradient>
      </defs>
      {/* Wine fill — a rect clipped to the glass bowl */}
      {fillPct > 0 && (
        <rect x="7" y={wineY} width="14" height={bowlBottom - wineY + 0.5} fill="url(#wineGrad)" clipPath="url(#wineClip)"/>
      )}
      {/* Wine surface highlight */}
      {fillPct > 0 && fillPct < 100 && (
        <ellipse cx="14" cy={wineY + 0.2} rx="4.5" ry="0.5" fill="#c44050" clipPath="url(#wineClip)" opacity="0.6"/>
      )}
      {/* Glass outline */}
      <g fill="none" stroke="#5a4030" strokeWidth="1.1" strokeLinecap="round" strokeLinejoin="round">
        {/* Bowl */}
        <path d="M 9,5 Q 8.3,10.5 9,13.5 Q 9.8,16.3 14,16.5 Q 18.2,16.3 19,13.5 Q 19.7,10.5 19,5 Z"/>
        {/* Rim */}
        <line x1="9" y1="5" x2="19" y2="5"/>
        {/* Stem */}
        <line x1="14" y1="16.5" x2="14" y2="22"/>
        {/* Base */}
        <path d="M 10.5,22 Q 14,23 17.5,22"/>
      </g>
    </svg>
  );
};

// ─── WINE GLASS (bare, fills with wine) ─ for inline use in rating sliders ───
const WineGlassFill = ({ size = 22, fillPct = 0, color = "#a01f2f", outline = "#5a4030" }) => {
  const bowlTop = 8, bowlBottom = 16;
  const wineY = bowlBottom - ((bowlBottom - bowlTop) * Math.max(0, Math.min(100, fillPct)) / 100);
  const clipId = `wfClip-${Math.random().toString(36).slice(2,9)}`;
  return (
    <svg width={size} height={size} viewBox="0 0 28 28" xmlns="http://www.w3.org/2000/svg" style={{flexShrink:0}}>
      <defs>
        <clipPath id={clipId}>
          <path d="M 9,5 Q 8.3,10.5 9,13.5 Q 9.8,16.3 14,16.5 Q 18.2,16.3 19,13.5 Q 19.7,10.5 19,5 Z"/>
        </clipPath>
      </defs>
      {fillPct > 0 && (
        <rect x="7" y={wineY} width="14" height={bowlBottom - wineY + 0.5} fill={color} clipPath={`url(#${clipId})`} opacity="0.92"/>
      )}
      {fillPct > 3 && fillPct < 100 && (
        <ellipse cx="14" cy={wineY + 0.3} rx="4.5" ry="0.5" fill="#c44050" clipPath={`url(#${clipId})`} opacity="0.55"/>
      )}
      <g fill="none" stroke={outline} strokeWidth="1" strokeLinecap="round" strokeLinejoin="round">
        <path d="M 9,5 Q 8.3,10.5 9,13.5 Q 9.8,16.3 14,16.5 Q 18.2,16.3 19,13.5 Q 19.7,10.5 19,5 Z"/>
        <line x1="9" y1="5" x2="19" y2="5"/>
        <line x1="14" y1="16.5" x2="14" y2="22"/>
        <path d="M 10.5,22 Q 14,23 17.5,22"/>
      </g>
    </svg>
  );
};

// ─── HELPERS ─────────────────────────────────────────────────────────────────
const getOverall = (winery) => {
  if (!winery.ratings || winery.ratings.length === 0) return null;
  const all = winery.ratings.flatMap(r => [r.wine, r.location, r.vibes, r.service].filter(v => v != null));
  if (all.length === 0) return null;
  return all.reduce((a, b) => a + b, 0) / all.length;
};
const avgRatingField = (winery, field) => {
  const vals = (winery.ratings || []).map(r => r[field]).filter(v => v != null);
  if (!vals.length) return null;
  return vals.reduce((a,b) => a+b, 0) / vals.length;
};
const exportCSV = (wineries) => {
  const rows = [["ID","Name","Dist John St (min)","Dist Riebe St (min)","Visited","Avg Wine","Avg Location","Avg Vibes","Avg Service","Bottles","Notes","Raters"]];
  wineries.forEach(w => {
    rows.push([w.id, w.name, w.distJohn, w.distRiebe, w.visited?"Yes":"No",
      avgRatingField(w,"wine")||"", avgRatingField(w,"location")||"",
      avgRatingField(w,"vibes")||"", avgRatingField(w,"service")||"",
      w.bottles||"", (w.notes||"").replace(/,/g,";"),
      (w.ratings||[]).map(r=>r.who).join("/")
    ]);
  });
  const csv = rows.map(r => r.map(v => `"${v}"`).join(",")).join("\n");
  const blob = new Blob([csv], {type:"text/csv"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a"); a.href=url; a.download="Ze_Barossa_export.csv"; a.click();
  URL.revokeObjectURL(url);
};

// ─── IMPORT CSV — merge external CSV back into the local winery list ─────────
// Matches rows by ID (preferred) or by Name (fallback). Updates visited flag,
// bottles, notes, and adds a lightweight "imported" rater record with the avg
// scores so imported data appears in the averages and Leaderboard.
const parseCSVLine = (line) => {
  // Minimal CSV parser that handles quoted cells with commas inside
  const out = []; let cur = ""; let inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') {
      if (inQ && line[i+1] === '"') { cur += '"'; i++; }
      else inQ = !inQ;
    } else if (c === "," && !inQ) {
      out.push(cur); cur = "";
    } else {
      cur += c;
    }
  }
  out.push(cur);
  return out;
};
const importCSV = (csvText, existing) => {
  const lines = csvText.replace(/\r/g,"").split("\n").filter(l => l.trim().length);
  if (lines.length < 2) return { wineries: existing, summary: "CSV is empty." };
  const header = parseCSVLine(lines[0]).map(h => h.replace(/^"|"$/g,"").trim().toLowerCase());
  const col = (name) => header.findIndex(h => h === name.toLowerCase());
  const iId = col("id"), iName = col("name");
  const iVisited = col("visited");
  const iWine = col("avg wine"), iLoc = col("avg location"), iVibes = col("avg vibes"), iServ = col("avg service");
  const iBottles = col("bottles"), iNotes = col("notes");
  if (iId < 0 && iName < 0) return { wineries: existing, summary: "CSV needs an ID or Name column." };
  // Build a clone of existing
  const out = existing.map(w => ({...w, ratings:[...(w.ratings||[])], photos:[...(w.photos||[])], visits:[...(w.visits||[])]}));
  let updated = 0, added = 0, skipped = 0;
  for (let li = 1; li < lines.length; li++) {
    const cells = parseCSVLine(lines[li]).map(c => c.replace(/^"|"$/g,""));
    const id = iId >= 0 ? parseInt(cells[iId],10) : null;
    const name = iName >= 0 ? cells[iName] : null;
    let idx = -1;
    if (id != null && !isNaN(id)) idx = out.findIndex(w => w.id === id);
    if (idx < 0 && name) idx = out.findIndex(w => (w.name||"").toLowerCase() === name.toLowerCase());
    if (idx < 0) { skipped++; continue; }
    const w = out[idx];
    if (iVisited >= 0) {
      const v = (cells[iVisited]||"").trim().toLowerCase();
      w.visited = (v === "yes" || v === "true" || v === "1");
    }
    if (iBottles >= 0 && cells[iBottles]) {
      const b = parseInt(cells[iBottles], 10);
      if (!isNaN(b)) w.bottles = b;
    }
    if (iNotes >= 0 && cells[iNotes]) w.notes = cells[iNotes];
    // Avg rating fields: only set if non-empty AND no existing ratings (don't overwrite real data)
    const avgs = {
      wine: iWine >= 0 ? parseFloat(cells[iWine]) : NaN,
      location: iLoc >= 0 ? parseFloat(cells[iLoc]) : NaN,
      vibes: iVibes >= 0 ? parseFloat(cells[iVibes]) : NaN,
      service: iServ >= 0 ? parseFloat(cells[iServ]) : NaN,
    };
    const hasAvg = Object.values(avgs).some(v => !isNaN(v));
    if (hasAvg && (!w.ratings || w.ratings.length === 0)) {
      w.ratings = [{
        who: "imported",
        wine: isNaN(avgs.wine) ? null : avgs.wine,
        location: isNaN(avgs.location) ? null : avgs.location,
        vibes: isNaN(avgs.vibes) ? null : avgs.vibes,
        service: isNaN(avgs.service) ? null : avgs.service,
      }];
    }
    updated++;
  }
  return { wineries: out, summary: `Updated ${updated}, skipped ${skipped} (no match).` };
};

const PhotoSection = ({ photos, onAdd, onDelete, editable }) => {
  const fileRef = useRef();
  const handleFile = (e) => {
    const files = Array.from(e.target.files);
    files.forEach(f => {
      const reader = new FileReader();
      reader.onload = ev => onAdd(ev.target.result);
      reader.readAsDataURL(f);
    });
    e.target.value = "";
  };
  return (
    <div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        {(photos||[]).map((src,i) => (

            {[["Wine",avgRatingField(winery,"wine"),C.dustyPink],["Location",avgRatingField(winery,"location"),C.dustyBlue],["Vibes",avgRatingField(winery,"vibes"),C.sage],["Service",avgRatingField(winery,"service"),C.earth]].map(([lbl,val,col])=>(

                <div style={{flex:1}}><RatingBar value={val} color={col}/></div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
};

        </div>
      </div>

const MapView = ({ wineries, onSelect }) => {
  const [mapFilter, setMapFilter] = useState("all");
  const [tip, setTip] = useState(null);
  const [pan, setPan] = useState({x:0,y:0});
  const [zoom, setZoom] = useState(1);
  const dragRef = useRef(null);
  const lastPinchRef = useRef(null);
  const homePos = toXY(-34.5208, 138.9736);

  const clamp = (p,z) => {
    const mx=W*(z-1)*0.55, my=H*(z-1)*0.55;
    return {x:Math.max(-mx,Math.min(mx,p.x)),y:Math.max(-my,Math.min(my,p.y))};
  };
  const onTS = (e) => {
    if(e.touches.length===1) dragRef.current={x:e.touches[0].clientX-pan.x,y:e.touches[0].clientY-pan.y};
    else if(e.touches.length===2) lastPinchRef.current=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
  };
  const onTM = (e) => {
    e.preventDefault();
    if(e.touches.length===1&&dragRef.current) setPan(clamp({x:e.touches[0].clientX-dragRef.current.x,y:e.touches[0].clientY-dragRef.current.y},zoom));
    else if(e.touches.length===2&&lastPinchRef.current){
      const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
      const nz=Math.max(1,Math.min(3.5,zoom*(d/lastPinchRef.current)));
      lastPinchRef.current=d; setZoom(nz); setPan(p=>clamp(p,nz));
    }
  };
  const onTE = ()=>{ dragRef.current=null; lastPinchRef.current=null; };

              const dx = tip.px - homePos.x;

              const straight = Math.hypot(dx, dy);
              if (straight < 2) return null;
              // SVG units → km (map spans ~25km over ~380 units)
              const kmPerUnit = 0.066;
              const driveKm = (straight * kmPerUnit * 1.42);
              const bikeKm  = (straight * kmPerUnit * 1.28);
              const walkKm  = (straight * kmPerUnit * 1.18);
              const driveMin = Math.max(3, Math.round((driveKm / 50) * 60));
              const bikeMin  = Math.max(5, Math.round((bikeKm / 16) * 60));
              const walkMin  = Math.max(10, Math.round((walkKm / 5) * 60));
              const showWalk = walkKm <= 3.5;

              const nx = -dy / straight, ny = dx / straight; // perpendicular unit
              const mx = (homePos.x + tip.px) / 2, my = (homePos.y + tip.py) / 2;
              // waypoints for each route (offset so they don't overlap)
              const drivePath = `M ${homePos.x},${homePos.y} Q ${mx + nx*7},${my + ny*7} ${tip.px},${tip.py}`;
              const bikePath  = `M ${homePos.x},${homePos.y} Q ${mx - nx*6},${my - ny*6} ${tip.px},${tip.py}`;
              const walkPath  = `M ${homePos.x},${homePos.y} Q ${mx + nx*1.5},${my + ny*1.5} ${tip.px},${tip.py}`;

              return (
                <g pointerEvents="none">

                  <path d={drivePath} stroke="#b25870" strokeWidth="1.6" strokeLinecap="round" fill="none"/>
                  <path d={drivePath} stroke="#ffffff" strokeWidth="0.35" strokeDasharray="2.5,1.8" strokeLinecap="round" fill="none" opacity="0.9"/>

                  {/* biking — dashed forest green */}
                  <path d={bikePath} stroke="#4a6838" strokeWidth="1.6" fill="none" opacity="0.4"/>
                  <path d={bikePath} stroke="#7aa868" strokeWidth="1.2" strokeDasharray="3.2,1.8" strokeLinecap="round" fill="none" opacity="0.95"/>

                  {/* walking — dotted ochre (only if close enough) */}
                  {showWalk && (
                    <path d={walkPath} stroke="#8a6238" strokeWidth="1.1" strokeDasharray="0.5,1.3" strokeLinecap="round" fill="none" opacity="0.9"/>

                      <text textAnchor="middle" y="4" fontSize="3.8" fill="#8a6238" fontStyle="italic">{driveKm.toFixed(1)} km</text>
                    </g>
                    {/* bike chip */}
                    <g transform={`translate(${mx - nx*10},${my - ny*10})`}>
                      <rect x="-17" y="-6" width="34" height="12" rx="2.5" fill="#fffaed" stroke="#4a6838" strokeWidth="0.5" opacity="0.97"/>

                      <text textAnchor="middle" y="4" fontSize="3.8" fill="#8a6238" fontStyle="italic">{bikeKm.toFixed(1)} km</text>
                    </g>
                    {/* walk chip */}
                    {showWalk && (
                      <g transform={`translate(${mx + nx*1.5 + 18},${my + ny*1.5 + 14})`}>
                        <rect x="-17" y="-6" width="34" height="12" rx="2.5" fill="#fffaed" stroke="#8a6238" strokeWidth="0.5" opacity="0.97"/>

                        <text textAnchor="middle" y="4" fontSize="3.8" fill="#8a6238" fontStyle="italic">{walkKm.toFixed(1)} km</text>

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
  const [wineries, setWineries] = useState(() => {
    try { const s=localStorage.getItem("barossa_v3"); return s?JSON.parse(s):INITIAL_DATA; } catch { return INITIAL_DATA; }
  });
  const [view, setView] = useState("home");
  const [search, setSearch] = useState("");
  const [sortBy, setSortBy] = useState("name");
  const [ratingFilter, setRatingFilter] = useState("overall"); // overall|wine|location|vibes|service
  const [minRating, setMinRating] = useState(0);
  const [showFilters, setShowFilters] = useState(false);
  const [selected, setSelected] = useState(null);
  const [showAdd, setShowAdd] = useState(false);
  const [showScrollTop, setShowScrollTop] = useState(false);
  const listRef = useRef(null);

  useEffect(()=>{ try{localStorage.setItem("barossa_v3",JSON.stringify(wineries));}catch{} },[wineries]);

  const handleScroll = useCallback((e) => {
    setShowScrollTop(e.target.scrollTop > 300);
  }, []);

  const tabs = [
    {id:"home",label:"Home",icon:<Icons.Home size={16}/>},
    {id:"leaderboard",label:"Stats",icon:<Icons.Trophy size={16}/>},
    {id:"all",label:"All",icon:<Icons.Map size={16}/>},
    {id:"visited",label:"Visited",icon:<Icons.Check size={16}/>},
    {id:"notyet",label:"Not Yet",icon:<Icons.WineGlass size={16}/>},
    {id:"shortlist",label:"Shortlist",icon:<Icons.Star size={16}/>},
    {id:"map",label:"Map",icon:<Icons.Pin size={16}/>},
  ];

  const getRatingValue = (w, field) => field === "overall" ? getOverall(w) : avgRatingField(w, field);

  const filtered = wineries.filter(w => {
    if (search && !w.name.toLowerCase().includes(search.toLowerCase())) return false;
    if (view==="visited") return w.visited;
    if (view==="notyet") return !w.visited;
    if (view==="shortlist") return w.shortlisted;
    if (minRating > 0) {
      const val = getRatingValue(w, ratingFilter);
      if (val == null || val < minRating) return false;
    }
    return true;
  }).sort((a,b)=>{
    if (sortBy==="name") return a.name.localeCompare(b.name);
    if (sortBy==="distJohn") return a.distJohn-b.distJohn;
    if (sortBy==="distRiebe") return a.distRiebe-b.distRiebe;
    if (sortBy==="rating") return (getRatingValue(b, ratingFilter)??-1)-(getRatingValue(a, ratingFilter)??-1);
    return 0;
  });

  const handleSave = (updated) => {
    setWineries(ws=>ws.map(w=>w.id===updated.id?updated:w));
    setSelected(updated);
  };
  const handleToggle = (id) => {
    setWineries(ws=>ws.map(w=>w.id===id?{...w,shortlisted:!w.shortlisted}:w));
    if(selected?.id===id) setSelected(s=>({...s,shortlisted:!s.shortlisted}));
  };
  const handleAdd = (w) => setWineries(ws=>[...ws,w]);

  const selectedLive = selected ? wineries.find(w=>w.id===selected.id)||selected : null;
  const showList = ["all","visited","notyet","shortlist"].includes(view);

  return (
    <div style={{height:"100%",background:C.cream,width:"100%",maxWidth:"100%",fontFamily:"'Helvetica Neue',Arial,sans-serif",display:"flex",flexDirection:"column",overflow:"hidden"}}>
      {/* Header */}
      <div className="zb-header" style={{background:C.cream,borderBottom:`1px solid ${C.border}`,padding:"14px 16px 0",position:"sticky",top:0,zIndex:50}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <Icons.Grape size={26} color={C.sage}/>
            <div>
              <div style={{fontFamily:"'Palatino Linotype',Palatino,Georgia,serif",fontSize:18,fontWeight:700,color:C.text,lineHeight:1}}>Ze Barossa</div>
              <div style={{fontSize:9,color:C.textLight,letterSpacing:1}}>WINERY TRACKER</div>
            </div>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>exportCSV(wineries)} title="Export CSV" style={{background:"white",border:`1px solid ${C.border}`,borderRadius:10,padding:"8px 12px",minHeight:36,cursor:"pointer",display:"flex",alignItems:"center",gap:4,fontSize:12,color:C.textMid,fontWeight:600}}>
              <Icons.Download size={14} color={C.textMid}/>Export
            </button>
            <button onClick={()=>document.getElementById("zb-csv-input").click()} title="Import CSV (merge by ID or Name)" style={{background:"white",border:`1px solid ${C.border}`,borderRadius:10,padding:"8px 12px",minHeight:36,cursor:"pointer",display:"flex",alignItems:"center",gap:4,fontSize:12,color:C.textMid,fontWeight:600}}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>Import
            </button>
            <input id="zb-csv-input" type="file" accept=".csv,text/csv" style={{display:"none"}} onChange={e=>{
              const file = e.target.files && e.target.files[0];
              if(!file) return;
              const reader = new FileReader();
              reader.onload = () => {
                const { wineries: merged, summary } = importCSV(String(reader.result), wineries);
                if (confirm(`Import preview: ${summary}\n\nApply changes?`)) {
                  setWineries(merged);
                }
              };
              reader.readAsText(file);
              e.target.value = ""; // allow re-import of same file
            }}/>
            <button onClick={()=>setShowAdd(true)} style={{background:C.earth,color:"white",border:"none",borderRadius:10,padding:"8px 14px",minHeight:36,fontSize:13,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",gap:4}}>
              <Icons.Plus size={15} color="white"/>Add
            </button>
          </div>
        </div>
        {/* Tab bar */}
        <div style={{display:"flex",gap:0,overflowX:"auto",scrollbarWidth:"none",marginLeft:-16,paddingLeft:16,marginRight:-16,paddingRight:16}}>
          {tabs.map(t=>(
            <button key={t.id} onClick={()=>setView(t.id)} style={{padding:"8px 10px",border:"none",background:"transparent",cursor:"pointer",fontSize:11,fontWeight:view===t.id?700:400,color:view===t.id?C.earth:C.textLight,borderBottom:`2px solid ${view===t.id?C.earth:"transparent"}`,whiteSpace:"nowrap",display:"flex",alignItems:"center",gap:3,flexShrink:0}}>
              {t.icon}{t.label}
            </button>
          ))}
        </div>
      </div>

      {/* Search + Filter bar for list views */}
      {showList && (
        <div style={{background:C.cream,borderBottom:`1px solid ${C.border}`}}>
          <div style={{padding:"10px 16px",display:"flex",gap:8}}>
            <input type="text" value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search wineries…" style={{flex:1,padding:"8px 12px",borderRadius:10,border:`1px solid ${C.border}`,fontSize:14,background:"white"}}/>
            <select value={sortBy} onChange={e=>setSortBy(e.target.value)} style={{padding:"8px 6px",borderRadius:10,border:`1px solid ${C.border}`,fontSize:12,background:"white",color:C.textMid}}>
              <option value="name">A–Z</option>
              <option value="distJohn">John St</option>
              <option value="distRiebe">Riebe St</option>
              <option value="rating">Rating ↓</option>
            </select>
            <button onClick={()=>setShowFilters(f=>!f)} aria-label="Filter" style={{padding:"4px 8px 4px 4px",borderRadius:22,border:`1px solid ${showFilters||minRating>0?C.earth:C.border}`,background:showFilters||minRating>0?C.earthLight:"white",fontSize:12,color:showFilters||minRating>0?C.earth:C.textMid,fontWeight:600,cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",gap:5}}>
              <WineGlassFilter size={30} fillPct={(minRating/9)*100} active={showFilters||minRating>0}/>
              {minRating>0?`≥${minRating}`:"Filter"}
            </button>
          </div>
          {showFilters && (
            <div style={{padding:"0 16px 12px"}}>
              <div style={{background:"white",border:`1px solid ${C.border}`,borderRadius:12,padding:"12px 14px"}}>
                <div style={{fontSize:11,color:C.textMid,fontWeight:700,marginBottom:8,letterSpacing:0.3}}>FILTER BY RATING CATEGORY</div>
                <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>
                  {[["overall","Overall"],["wine","Wine"],["location","Location"],["vibes","Vibes"],["service","Service"]].map(([key,lbl])=>(
                    <button key={key} onClick={()=>setRatingFilter(key)} style={{padding:"4px 12px",borderRadius:20,border:`1px solid ${ratingFilter===key?C.earth:C.border}`,background:ratingFilter===key?C.earthLight:"transparent",color:ratingFilter===key?C.earth:C.textLight,fontSize:12,fontWeight:ratingFilter===key?700:400,cursor:"pointer"}}>
                      {lbl}
                    </button>
                  ))}
                </div>
                <div style={{fontSize:11,color:C.textMid,fontWeight:700,marginBottom:6,letterSpacing:0.3}}>MINIMUM SCORE: <span style={{color:C.earth}}>{minRating===0?"Any":minRating+"/10"}</span></div>
                <div style={{position:"relative",height:40}}>
                  <div style={{position:"absolute",left:14,right:14,top:"50%",marginTop:-3,height:6,background:"white",borderRadius:3,border:`1px solid ${C.border}`}}/>
                  <div style={{position:"absolute",left:14,top:"50%",marginTop:-3,width:`calc((100% - 28px) * ${(minRating/9)*100/100})`,height:6,background:C.earth,borderRadius:3,transition:"width 0.08s linear"}}/>
                  <div style={{position:"absolute",left:`calc((100% - 28px) * ${(minRating/9)})`,top:"50%",marginTop:-15,width:30,height:30,pointerEvents:"none",filter:"drop-shadow(0 1px 2px rgba(90,60,30,0.35))",transition:"left 0.08s linear"}}>
                    <WineGlassFill size={30} fillPct={(minRating/9)*100}/>
                  </div>
                  <input type="range" min="0" max="9" step="0.5" value={minRating} onChange={e=>setMinRating(parseFloat(e.target.value))}
                    aria-label="Minimum rating"
                    style={{position:"absolute",left:0,right:0,top:0,bottom:0,width:"100%",height:"100%",opacity:0,margin:0,padding:0,cursor:"pointer",WebkitAppearance:"none"}}/>
                </div>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:C.textLight,marginTop:4,padding:"0 14px"}}>
                  <span>Any</span><span>5</span><span>9/10</span>
                </div>
                {minRating>0&&<button onClick={()=>{setMinRating(0);setRatingFilter("overall");}} style={{marginTop:8,fontSize:11,color:C.dustyPink,background:"none",border:"none",cursor:"pointer",padding:0,fontWeight:600}}>✕ Clear filter</button>}
              </div>
            </div>
          )}
        </div>
      )}

      {/* Content */}
      <div ref={listRef} onScroll={handleScroll} style={{flex:1,minHeight:0,overflowY:"auto",WebkitOverflowScrolling:"touch",overscrollBehavior:"contain",width:"100%",padding:showList?"12px 16px 80px":0}}>
        {view==="home" && <HomePage wineries={wineries} onNavigate={setView}/>}
        {view==="leaderboard" && <div style={{padding:"16px 16px 80px",overflowY:"auto",WebkitOverflowScrolling:"touch",flex:1,minHeight:0}}><Stats wineries={wineries} onSelect={setSelected}/></div>}
        {view==="map" && <MapView wineries={wineries} onSelect={setSelected}/>}
        {showList && (
          filtered.length===0?(
            <div style={{textAlign:"center",padding:"40px 20px",color:C.textLight}}>
              <div style={{marginBottom:12}}><Icons.Grape size={40} color={C.border}/></div>
              <div style={{fontFamily:"Georgia,serif",fontSize:15,color:C.textMid}}>{view==="shortlist"?"No wineries on your shortlist yet":"No wineries found"}</div>
            </div>
          ):filtered.map(w=>(
            <WineryCard key={w.id} winery={w} onOpen={setSelected} onToggleShortlist={handleToggle}/>
          ))
        )}
      </div>

      {/* Scroll to top */}
      {showScrollTop && (
        <button onClick={()=>listRef.current?.scrollTo({top:0,behavior:"smooth"})} style={{position:"fixed",bottom:20,right:20,width:44,height:44,borderRadius:"50%",background:C.earth,color:"white",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 4px 14px rgba(100,60,20,0.3)",zIndex:100}}>
          <Icons.ChevronUp size={20} color="white"/>
        </button>
      )}

      {/* Detail Modal */}
      {selectedLive && <DetailModal winery={selectedLive} onClose={()=>setSelected(null)} onSave={handleSave} onToggleShortlist={handleToggle}/>}

      {/* Add Modal */}
      {showAdd && <AddModal onClose={()=>setShowAdd(false)} onAdd={handleAdd}/>}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
